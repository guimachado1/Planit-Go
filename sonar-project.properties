# SonarQube Cloud — ajuste organization e projectKey no painel do projeto:
# https://sonarcloud.io → seu projeto → Project Information

sonar.organization=guimachado1
sonar.projectKey=guimachado1_Planit-Go

sonar.projectName=Planit Go
sonar.sourceEncoding=UTF-8

# Monorepo: API (backend) + web (frontend)
sonar.sources=backend/src,frontend/src
sonar.tests=backend/test,frontend/src

sonar.test.inclusions=**/*.test.js,**/*.test.jsx

sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

sonar.exclusions=\
**/node_modules/**,\
**/dist/**,\
**/build/**,\
**/coverage/**,\
backend/migrations/**,\
backend/scripts/**,\
**/.env*,\
**/*.sql
